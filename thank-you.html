<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for contacting QuickPOS. We'll get back to you soon.">
    <title>Thank You — QuickPOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .thankyou-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .thankyou-card {
            text-align: center;
            max-width: 560px;
            padding: 3.5rem 2.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out;
        }

        .thankyou-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.4);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        .thankyou-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .thankyou-message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .thankyou-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .thankyou-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 60px rgba(99, 102, 241, 0.6); }
        }

        /* Background orbs */
        .ty-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
        }
        .ty-orb-1 {
            width: 400px; height: 400px;
            background: #6366f1;
            top: -100px; left: -100px;
        }
        .ty-orb-2 {
            width: 350px; height: 350px;
            background: #8b5cf6;
            bottom: -80px; right: -80px;
        }
    </style>
</head>
<body>
    <div class="thankyou-page">
        <div class="ty-orb ty-orb-1"></div>
        <div class="ty-orb ty-orb-2"></div>

        <div class="thankyou-card">
            <div class="thankyou-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1 class="thankyou-title">Thank You!</h1>
            <p class="thankyou-message">
                Your message has been received successfully. Our team will review it and get back to you within 24 hours. 
                We appreciate your interest in QuickPOS!
            </p>
            <a href="index.php" class="thankyou-btn">
                <i class="fas fa-arrow-left"></i>
                Back to Home
            </a>
        </div>
    </div>
</body>
</html>
